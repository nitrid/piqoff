name: Trigger auto deployment for piqsoft

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ test ]
    paths:
    - '**'
    - '.github/workflows/piqsoft-AutoDeployTrigger-0b089ea8-6cba-4345-9a19-6512738b9051.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PIQSOFT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PIQSOFT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PIQSOFT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: mainapps.azurecr.io
          registryUsername: ${{ secrets.PIQSOFT_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PIQSOFT_REGISTRY_PASSWORD }}
          containerAppName: piqsoft
          resourceGroup: apps
          imageToBuild: mainapps.azurecr.io/piqsoft:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


